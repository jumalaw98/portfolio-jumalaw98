name: Build and test gate
description: Runs the shared pre-publish gating steps (Velite build, tests, placeholder check)
runs:
  using: composite
  steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
      with:
        node-version: 22
        cache: npm

    - run: npm ci --ignore-scripts
      shell: bash

    - name: Build Velite
      run: npx --no-install velite build
      shell: bash
      env:
        NODE_ENV: production

    - name: Run tests
      run: npx --no-install vitest run
      shell: bash

    - name: Check for placeholders
      run: npx --no-install tsx scripts/check-placeholders.ts
      shell: bash
