name: Draft Summary

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 22
          cache: npm
      
      - run: npm ci --ignore-scripts
      
      # Gate: validate, test, placeholder scan
      - name: Build Velite
        run: npx --no-install velite build
        env:
          NODE_ENV: production
      
      - name: Run tests
        run: npx --no-install vitest run
      
      - name: Check for placeholders
        run: npx --no-install tsx scripts/check-placeholders.ts
      
      # Generate summaries for posts that need them
      - name: Generate summaries
        id: generate
        run: |
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          npx --no-install tsx scripts/generate-summaries.ts >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      
      # Create PR if any files changed
      - name: Create Pull Request
        if: steps.generate.outputs.changes != ''
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff0f
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-generate summary hooks"
          title: "chore: auto-generated summary hooks"
          body: |
            This PR was automatically created by the Draft Summary workflow.
            
            Posts updated:
            ```
            ${{ steps.generate.outputs.changes }}
            ```
            
            Please review the generated summaries before merging.
          branch: bot/generated-summary
          delete-branch: true
          reviewers: jumalaw98
