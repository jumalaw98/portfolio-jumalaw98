# ──────────────────────────────────────────────────────────────────
# Release — Production Deployment
# ──────────────────────────────────────────────────────────────────
# Triggers on push to main (after PR merge).
#
# This workflow is OPTIONAL if you use Vercel's native GitHub
# integration (recommended). Keep this file if you want:
#   - Explicit deployment from CI (not the Vercel app)
#   - Pre-deploy smoke tests
#   - Deployment notifications (Slack, Discord, etc.)
#   - Multi-environment promotion (staging → production)
#
# If using Vercel's GitHub integration: delete this file or
# set it to only run on workflow_dispatch (manual trigger).
# ──────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

concurrency:
  # Serialize deploys: don't cancel, queue instead
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment deploy URL
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const deployUrl = '${{ steps.deploy.outputs.deploy_url }}';
            const commitSha = context.sha;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: `🚀 Deploy to production complete!\n\n**Preview:** ${deployUrl}\n\n_This deployment was triggered by a push to \`${context.ref}\`._`
            });

      - name: Summary
        run: |
          {
            echo "## 🚀 Production Deployment Complete"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Environment | production |"
            echo "| Deploy URL | ${{ steps.deploy.outputs.deploy_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
