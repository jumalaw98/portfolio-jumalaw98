# ──────────────────────────────────────────────────────────────────
# CodeQL — GitHub-Native Security Analysis
# ──────────────────────────────────────────────────────────────────
# Runs on:
#   - Every PR to main (fast feedback on new vulnerabilities)
#   - Every push to main (baseline scan)
#   - Weekly schedule (catch vulnerabilities in existing code)
#
# Why separate from ci.yml:
#   CodeQL is slower (~3 min) and has different failure semantics.
#   It is informational (not a required status check) to avoid
#   blocking merges on false positives or noisy results.
#
# Best practice: keep fail-fast: false so all languages are scanned
# even if one fails.
# ──────────────────────────────────────────────────────────────────

name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 08:00 UTC — catch issues over the weekend
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false # always complete all languages even if one fails
      matrix:
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          # Use a config file if you need custom query suites or paths:
          # config-file: ./.github/codeql/codeql-config.yml
          # queries: security-extended,security-and-quality

      - name: Build
        run: |
          npm ci
          npx next build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
          upload: True
          output: codeql-results

      - name: Upload SARIF (if analysis fails)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-results-${{ matrix.language }}
          path: codeql-results/
          retention-days: 7
