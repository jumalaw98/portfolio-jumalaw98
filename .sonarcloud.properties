# SonarCloud configuration for automatic analysis
# See https://docs.sonarsource.com/sonarcloud/advanced-configuration/analysis-parameters/

# ── Issue exclusions ──────────────────────────────────────────────────────────
# These are intentional, justified violations:
# - S1523: MdxContent.tsx uses new Function() to evaluate Velite-compiled MDX
#   (authored content at build time, never user input)
# - S8690: publish-devto.ts constructs a dev.to API URL from a validated numeric
#   ID (checked with Number.isFinite before interpolation)

sonar.issue.ignore.multicriteria = e1,e2

# S1523 - Dynamic Function evaluation for Velite MDX rendering
sonar.issue.ignore.multicriteria.e1.ruleKey = typescript:S1523
sonar.issue.ignore.multicriteria.e1.resourceKey = src/components/blog/MdxContent.tsx

# S8690 - URL injection via fetch for dev.to API
sonar.issue.ignore.multicriteria.e2.ruleKey = typescript:S8690
sonar.issue.ignore.multicriteria.e2.resourceKey = scripts/publish-devto.ts
